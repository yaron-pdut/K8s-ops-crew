kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-ops-crew
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
  - role: worker
